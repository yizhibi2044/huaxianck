<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Website of Oil Painter Du Huaxian 油画家杜华显</title>
    <meta name="description" content="欢迎访问中国美术家协会会员、杜华显个人网站，油画家杜华显的官方网站。">
    <meta name="keywords" content="杜华显, 杜华显油画, 杜华显个人网站，杜华显官网">

    <style>
        header {
            padding-left: 40px;
            padding-right: 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .thumb-title {
            text-align: left;
            font-size: 14px;
            color: #444444;
            line-height: 1.5;
            margin-top: 8px;
            margin-bottom: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .gallery-container {
            padding-left: 20px;
            padding-right: 20px;
            box-sizing: border-box;
        }

        /* ==================== 轮播图样式保持不变 ==================== */
        .carousel-container {
            width: 100%;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
        }

        .carousel-track {
            display: flex;
            width: 1650%;
            animation: slideAnimation 60s infinite linear;
        }

        .carousel-container:hover .carousel-track {
            animation-play-state: paused;
        }

        .carousel-slide {
            width: 5.6%;
            margin-right: 0.2%;
            flex-shrink: 0;
        }

        .carousel-slide img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        @keyframes slideAnimation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-94.1%); }
        }

        /* ==================== 四宫格核心修复 ==================== */
        .grid-four-columns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 30px;
        }

        .thumb-image-box {
            display: block;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .thumb-image-box:hover {
            transform: scale(1.03);
        }

        .thumb-image-box img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            border-radius: 4px;
        }

        /* 日常动态悬浮提示 */
        .daily-update-box::after {
            content: "点击查看更多 →";
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(34,34,34,0.85);
            color: white;
            font-size: 13px;
            padding: 5px 12px;
            border-radius: 4px;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .daily-update-box:hover::after {
            opacity: 1;
        }

        /* ==================== 其他原有样式 ==================== */
        .modal-overlay { ... } /* 你的弹窗样式保持不变 */
        .artist-profile-section { ... } /* 简介部分样式保持不变 */

        @media (max-width: 768px) {
            .grid-four-columns {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

        <header>

            <!-- 轮播图部分不变 -->

                <div class="carousel-track">
                    <!-- 你的轮播图片... 保持不变 -->
                    <div class="carousel-slide"><img src="haibian.jpg" data-title="海边系列" data-size="80x100cm" data-year="2024"></div>
                    <!-- ... 其他轮播图片 ... -->
                </div> 
            </div>
            
            <!-- ✅ 修复后的四宫格 -->
            <div class="grid-four-columns">
                <!-- 日常动态 - 可点击 -->
                <a href="daily-updates.html" class="thumb-image-box daily-update-box">
                    <img src="duhuaixanbenren.jpg" alt="日常动态">
                    <p class="thumb-title">Daily Updates <br> 日常动态2026年</p>
                </a>
                
                <div class="thumb-image-box">
                    <img src="nangua.jpg" alt="风景写生">
                    <p class="thumb-title">Landscape Sketching <br> 风景写生作品</p>
                </div>
                
                <div class="thumb-image-box">
                    <img src="lvshu.jpg" alt="大型创作">
                    <p class="thumb-title">Major Production <br> 大型创作</p>
                </div>
                
                <div class="thumb-image-box">
                    <img src="yumin11.jpg" alt="公益活动">
                    <p class="thumb-title">Charity Event <br>公益活动</p>
                </div>
            </div>

            <!-- 个人简介部分（保持不变） -->
            <section class="artist-profile-section">
                <!-- ... 你的简介内容 ... -->
            </section>

        </div>
        </div>

        <footer>
            <p>© 2026 Minimalism Grid. All rights reserved.</p>
        </footer>
    </div>

    <!-- 弹窗部分保持不变 -->
    <div class="modal-overlay" id="imageModal">...</div>

    <script>

    </script>
</body>
</html>
