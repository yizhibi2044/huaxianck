<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Website of Oil Painter Du Huaxian 油画家杜华显先个人官方网站</title>
    <meta name="description" content="欢迎访问中国美术家协会会员、杜华显个人网站，油画家杜华显的官方网站。本站收录了杜华显先生的经典油画作品，包括《渔歌朝晖迎华诞》系列、《幸福生活之二》、荷花系列及各地写生作品，展现点、线、面的形式语言与当代色块融合的表现主义艺术风格。">
    <meta name="keywords" content="杜华显, 杜华显油画, 杜华显个人网站，杜华显官网, 中国美协会员杜华显, 杜华显渔歌朝晖迎华诞, 杜华显当代油画, 杜华显作品 杜华显油画">
    
    <style>
        /* ⚡ 新增：控制整个视觉展示区（大图和小图）的左右1.5厘米留白 ⚡ */
        .gallery-container {
            padding-left: 20px;
            padding-right: 20px;
            box-sizing: border-box; /* 确保加了边距后总宽度不会超出一屏 */
        }

        /* ⚡ 新增：让顶部名字和导航也同步缩进，保持完美左对齐 ⚡ */
        header {
            padding-left: 20px;
            padding-right: 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .carousel-container {
            width: 100%;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
        }

        .carousel-track {
            display: flex;
            width: 1650%;
            animation: slideAnimation 60s infinite linear;
        }

        .carousel-container:hover .carousel-track {
            animation-play-state: paused;
            cursor: pointer; /* 鼠标变成手型，提示可以点击 */
        }

        .carousel-slide {
            width: 5.6%;
            margin-right: 0.2%;
            flex-shrink: 0;
        }

        .carousel-slide img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        @keyframes slideAnimation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-94.1%); }
        }

        .grid-four-columns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 30px;
        }

        .thumb-image-box img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        /* 弹窗遮罩背景 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9); /* 纯黑半透明，烘托油画色彩 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* 弹窗激活时的状态 */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 弹窗内容包裹盒 */
        .modal-content {
            background: #fff;
            padding: 24px;
            max-width: 85vw;
            max-height: 90vh;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* 弹出的大图样式 */
        .modal-img {
            max-width: 100%;
            max-height: 70vh; /* 确保图片不会超出屏幕高度 */
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        /* 作品信息文字布局 */
        .modal-info {
            margin-top: 15px;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .modal-info h3 {
            margin: 0 0 6px 0;
            font-size: 20px;
            color: #111;
        }

        .modal-info p {
            margin: 0;
            font-size: 14px;
            color: #666;
        }

        /* 关闭按钮 */
        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            font-size: 35px;
            color: #fff;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: #ddd;
        }

        /* 个人简介模块样式 */
        .artist-profile-section {
            padding: 60px 20px;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333333;
            /* margin-top: 40px; ⚡ 核心修改：删除此行，让小图与简历衔接更紧凑 */
        }

        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-start;
            gap: 40px;
        }

        .profile-text {
            flex: 2;
        }

        .profile-title {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .profile-subtitle {
            font-size: 16px;
            color: #666666;
            margin: 0 0 25px 0;
        }

        .profile-bio p {
            font-size: 15px;
            line-height: 1.8;
            color: #444444;
            margin-bottom: 15px;
            text-align: justify;
            white-space: pre-line; /* 保持原有的换行格式 */
        }

        .profile-downloads {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-top: 10px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background-color: #111111;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .download-btn:hover {
            background-color: #444444;
        }

        .download-hint {
            font-size: 12px;
            color: #999999;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .profile-container {
                flex-direction: column;
                gap: 30px;
            }
            .profile-downloads {
                width: 100%;
            }
            .download-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
