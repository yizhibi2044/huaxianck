<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简视觉主页</title>
    <style>
       .carousel-container {
  width: 100%;
  overflow: hidden;
  position: relative;aspect-ratio: 16 / 9;

}

.carousel-track {
  display: flex;
  width: 1000%;
  animation: slideAnimation 20s infinite linear;
}

.carousel-slide {
  width: 10%;
  flex-shrink: 0;
}

.carousel-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

@keyframes slideAnimation {
  0% { transform: translateX(0); }
  100% { transform: translateX(-90%); }
}
        .grid-four-columns {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;margin-top: 20px;
}
.thumb-image-box img {
width: 100%;
height: auto;
object-fit: cover;
}
</style>
</head>
<body>

    <div class="wrapper">
        
        <!-- 极简字标/导航 -->
        <header>
            <h1>huaxian du 杜华显</h1>
            <p class="subtitle">dhx1974@gmail.com, but better.</p >
        </header>

        <!-- 视觉展示区 -->
        <div class="gallery-container">
            
            <!-- 上方大图 -->
            <div class="carousel-container">
  <div class="carousel-track">
    <div class="carousel-slide"><img src="haibian.jpg"></div>
    <div class="carousel-slide"><img src="yujia3.jpg"></div>
    <div class="carousel-slide"><img src="yujia1.jpg"></div>
    <div class="carousel-slide"><img src="yujia4.jpg"></div>
    <div class="carousel-slide"><img src="yujia6.jpg"></div>
    <div class="carousel-slide"><img src="yumin11.jpg"></div>
    <div class="carousel-slide"><img src="yujia8.jpg"></div>
    <div class="carousel-slide"><img src="yujia10.jpg"></div>
    <div class="carousel-slide"><img src="yujia9.jpg"></div>
    <div class="carousel-slide"><img src="yangguang.jpg"></div>
  </div>
</div>

            <!-- 下方 4 个小图 -->
            <div class="grid-four-columns">
                <div class="thumb-image-box">
                    <img src="nangua.jpg">
                </div>
                <div class="thumb-image-box">
                    <img src="gongyi1.jpg">
                </div>
                <div class="thumb-image-box">
                    <img src="lvshu.jpg">
                </div>
                <div class="thumb-image-box">
                    <img src="yumin11.jpg">
                </div>
            </div>

        </div>

        <!-- 页脚 -->
        <footer>
            <p>© 2026 Minimalism Grid. All rights reserved.</p >
        </footer>

    </div>

</body>
</html>
