<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简视觉主页</title>
    <style>
        /* 1. 基础全局样式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
        }

        /* 页面居中容器，控制最大宽度 */
        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        /* 网站顶部文字 */
        header {
            margin-bottom: 48px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: #666666;
            font-size: 1rem;
            margin-top: 4px;
        }

        /* 2. 核心图片布局组件 */
        .gallery-container {
            display: flex;
            flex-direction: column;
            gap: 24px; /* 控制图片之间的留白间距 */
        }

        /* 上方大图区 */
        .hero-image-box {
            width: 100%;
            /* 设定大图比例，你可以根据需要调整高度 */
            aspect-ratio: 16 / 9; 
            overflow: hidden;
            background-color: #f5f5f5; /* 图片加载前的占位背景色 */
        }

        /* 下方 4 张小图的网格布局 */
        .grid-four-columns {
            display: grid;
            /* 核心：平分 4 列 */
            grid-template-columns: repeat(4, 1fr); 
            gap: 24px;
        }

        .thumb-image-box {
            width: 100%;
            /* 设定小图为正方形，极简风格常用比例 */
            aspect-ratio: 1 / 1; 
            overflow: hidden;
            background-color: #f5f5f5;
        }

        /* 通用图片样式：保持比例不变形，并加入自然的缩放微动效 */
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        img:hover {
            transform: scale(1.02); /* 鼠标悬浮时轻微放大，增加交互精致感 */
        }

        /* 3. 页脚信息 */
        footer {
            margin-top: 80px;
            font-size: 0.85rem;
            color: #999999;
            text-align: center;
        }

        /* 4. 移动端响应式适配 */
        @media (max-width: 768px) {
            .wrapper {
                padding: 40px 16px;
            }
            
            /* 在手机端，4张小图自动变成 2×2 排列，防止图片过小 */
            .grid-four-columns {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .gallery-container {
                gap: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <!-- 极简字标/导航 -->
        <header>
            <h1>Visual Portfolio</h1>
            <p class="subtitle">Less, but better.</p >
        </header>

        <!-- 视觉展示区 -->
        <div class="gallery-container">
            
            <!-- 上方大图 -->
            <div class="hero-image-box">
                <!-- 替换 src 后面的链接为你自己的大图路径 -->
                <img src="haibian.jpg">
            </div>

            <!-- 下方 4 个小图 -->
            <div class="grid-four-columns">
                <div class="thumb-image-box">
                    <img src="nangua.jpg">
                </div>
                <div class="thumb-image-box">
                    < img src="gongyi1.jpg">
                </div>
                <div class="thumb-image-box">
                    < img src="lvshu.jpg">
                </div>
                <div class="thumb-image-box">
                    < img src="yumin11.jpg">
                </div>
            </div>

        </div>

        <!-- 页脚 -->
        <footer>
            <p>© 2026 Minimalism Grid. All rights reserved.</p >
        </footer>

    </div>

</body>
</html>
