<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简个人主页</title>
    <style>
        /* 1. 基础重置与变量设定 */
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --link-hover: #0070f3;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. 布局容器（核心：控制最大宽度，两边留白） */
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 120px 24px;
        }

        /* 3. 排版样式 */
        header {
            margin-bottom: 64px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        section {
            margin-bottom: 48px;
        }

        h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 24px;
            font-weight: 500;
        }

        p {
            font-size: 1rem;
            margin-bottom: 16px;
            color: #222222;
        }

        /* 4. 列表与链接设计（克制、无下划线） */
        .item-list {
            list-style: none;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.15s ease;
        }

        a:hover {
            color: var(--link-hover);
        }

        .date {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        footer {
            margin-top: 96px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* 响应式微调 */
        @media (max-width: 600px) {
            .container {
                padding: 60px 20px;
            }
            .item {
                flex-direction: column;
                align-items: flex-start;
            }
            .date {
                margin-top: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 头部：你是谁 -->
        <header>
            <h1>你的名字</h1>
            <p class="subtitle">设计师 / 开发者 / 极简主义者</p >
        </header>

        <!-- 简介 -->
        <section>
            <p>你好，我是某某。我专注于用最纯粹的代码和视觉语言，创造清晰、实用且富有美感的数字体验。这里是我的一些日常思考与沉淀。</p >
        </section>

        <!-- 作品/项目 -->
        <section>
            <h2>Selected Work</h2>
            <ul class="item-list">
                <li class="item">
                    <a href=" " target="_blank">Minimalist Portfolio Theme</a >
                    <span class="date">2026</span>
                </li>
                <li class="item">
                    <a href="#" target="_blank">Lightweight CSS Boilerplate</a >
                    <span class="date">2025</span>
                </li>
                <li class="item">
                    <a href="#" target="_blank">Typography Exploration Tool</a >
                    <span class="date">2024</span>
                </li>
            </ul>
        </section>

        <!-- 联络方式 -->
        <section>
            <h2>Connect</h2>
            <ul class="item-list">
                <li class="item"><a href="mailto:your@email.com">Email</a ></li>
                <li class="item"><a href="#" target="_blank">GitHub</a ></li>
                <li class="item"><a href="#" target="_blank">Twitter</a ></li>
            </ul>
        </section>

        <!-- 页脚 -->
        <footer>
            <p>© 2026 Your Name. Less is more.</p >
        </footer>

    </div>

</body>
</html>
