<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Du Huaxian — Oil Painter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #111111;
  --white: #f8f6f2;
  --grey: #888;
  --accent: #c8502a;
}

body {
  font-family: 'Georgia', serif;
  background: var(--white);
  color: var(--black);
  overflow-x: hidden;
}

/* NAVIGATION */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 48px;
  background: rgba(248,246,242,0.96);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.nav-logo {
  font-size: 17px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  color: var(--black);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 40px;
  list-style: none;
}

.nav-links a {
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--accent);
}

/* PAGES */
.page {
  display: block;
  min-height: 100vh;
  padding-top: 80px;
}

.page.active {
  display: block;
}

/* HOME PAGE */
#home { padding-top: 0; }

.hero {
  height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
  position: relative;
}

.hero-canvas {
  width: 100%;
  height: 100%;
  background: linear-gradient(160deg, #1a2a4a 0%, #2a4a6a 30%, #c86828 60%, #e8b040 85%, #4a6a3a 100%);
  position: relative;
  overflow: hidden;
}

.hero-figures {
  position: absolute;
  bottom: 15%;
  left: 8%;
  right: 8%;
  height: 60%;
  display: flex;
  align-items: flex-end;
  gap: 6px;
}

.figure {
  flex: 1;
  border-radius: 40% 40% 0 0;
  opacity: 0.85;
}

.hero-text {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 64px;
  background: var(--white);
}

.hero-eyebrow { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--grey); margin-bottom: 24px; }
.hero-name { font-size: clamp(44px, 5vw, 70px); font-weight: normal; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 8px; }
.hero-name-zh { font-size: clamp(26px, 3vw, 40px); color: var(--grey); font-weight: normal; margin-bottom: 32px; letter-spacing: 0.1em; }
