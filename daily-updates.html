<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常动态 - 杜华显</title>
    <style>
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: #f8f8f8;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.7;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 50px;
            color: #222;
            font-size: 32px;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: #222;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 15px;
        }
        .back-btn:hover { background: #444; }

        /* ⚡ 开启全自动计数器 */
        .timeline {
            position: relative;
            padding-left: 45px; 
            counter-reset: my-counter; /* 初始化计数器 */
        }
        
        .event {
            position: relative;
            margin-bottom: 40px;
        }
        
        /* ⚡ 让浏览器自己计算并显示数字序号 */
        .event-date {
            position: absolute;
            left: -45px;
            top: 0;
            width: 35px;
            text-align: left;
            color: #222;
            font-size: 24px;
            font-weight: bold;
            line-height: 1;
            font-family: "Georgia", Times, serif;
        }
        /* 核心逻辑：每出现一个 event 块，数字自动加 1 */
        .event-date::before {
            counter-increment: my-counter;
            content: counter(my-counter);
        }
        
        .event-content {
            background: #fff;
            padding: 20px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid #eee;
        }
        
        /* 🎨 针对图片进行的画廊艺术级微调 */
        .event-content img {
            max-width: 100%;
            max-height: 500px;        /* ⚡ 核心：控制图片在网页中绝不拉得过长 */
            object-fit: contain;      /* ⚡ 核心：等比例缩放，油画绝对不扭曲变形 */
            border-radius: 6px;       /* 柔和的微圆角 */
            margin-top: 15px;         /* 与上方文字保持呼吸空隙 */
            display: block;
        }
        
        .event-content h3 {
            margin: 0 0 12px 0;
            color: #222;
            font-size: 20px;
        }
        .event-content p {
            color: #555;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <h1>日常动态 Daily Updates </h1>
        
        <div class="timeline">

            <div class="event">
                <div class="event-date"></div> 
                <div class="event-content">
                    <h3>2026年</h3>
                    <p>中国网专访 http://hs.china.com.cn/2026-04/03/content_43390277.html </p>
                    <img src="tu1.jpg" alt="2000年作品/证书">
                </div>
            </div>
            
            
            <div class="event">
                <div class="event-date"></div> 
                <div class="event-content">
                    <h3>2000年</h3>
                    <p>《农业知识》2000年12期版式山东省专业报刊新闻奖三等奖</p>
                    <img src="tu1.jpg" alt="2000年作品/证书">
                </div>
            </div>
            
            <div class="event">
                <div class="event-date"></div> 
                <div class="event-content">
                    <h3>1999年</h3>
                    <p>油画作品在山东省两代人书画摄影大赛中获得三等奖。</p>
                    <img src="tu2.jpg" alt="1999年作品">
                </div>
            </div>

            <div class="event">
                <div class="event-date"></div>
                <div class="event-content">
                    <h3>1999年</h3>
                    <p>《女人体》《油画风景》参加学院优秀学生汇报展。</p>
                    <img src="tu3.jpg" alt="1999年汇报展作品">
                </div>
            </div>

            <div class="event">
                <div class="event-date"></div>
                <div class="event-content">
                    <h3>成绩</h3>
                    <p>1998年油画作品《追寻》在庆祝改革开放二十周年美术作品展获三等奖</p>
                    <img src="tu4.jpg" alt="追寻">
                </div>
            </div>

            <div class="event">
                <div class="event-date"></div>
                <div class="event-content">
                    <h3>1997</h3>
                    <p>年在美术系素描大赛二等奖</p>
                    
                </div>
            </div>

            <div class="event">
                <div class="event-date"></div>
                <div class="event-content">
                    <h3>1996 山东艺术学院 油画第一工作室</h3>
                    <p>油画第一工作室 系统学习。</p>
                    
                </div>
            </div>

        </div>
    </div>
</body>
</html>
