<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常动态 2026 - 杜华显</title>
    <style>
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: #f8f8f8;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.7;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 50px;
            color: #222;
            font-size: 32px;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: #222;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 15px;
        }
        .back-btn:hover { background: #444; }

        /* ⚡ 开启全自动计数器 */
        .timeline {
            position: relative;
            padding-left: 45px; 
            counter-reset: my-counter; /* 初始化计数器 */
        }
        
        .event {
            position: relative;
            margin-bottom: 40px;
        }
        
        /* ⚡ 让浏览器自己计算并显示数字序号 */
        .event-date {
            position: absolute;
            left: -45px;
            top: 0;
            width: 35px;
            text-align: left;
            color: #222;
            font-size: 24px;
            font-weight: bold;
            line-height: 1;
            font-family: "Georgia", Times, serif;
        }
        /* 核心逻辑：每出现一个 event 块，数字自动加 1 */
        .event-date::before {
            counter-increment: my-counter;
            content: counter(my-counter);
        }
        
        .event-content {
            background: #fff;
            padding: 20px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid #eee;
        }
        .event-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 15px 0;
            display: block;
        }
        .event-content h3 {
            margin: 0 0 12px 0;
            color: #222;
            font-size: 20px;
        }
        .event-content p {
            color: #555;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <h1>日常动态 Daily Updates 2026</h1>
        
        <div class="timeline">

            <div class="event">
                <div class="event-date"></div> 
                <div class="event-content">
                    <h3>新动态标题（比如：北京工作室新创作）</h3>
                    <p>这里写今天的新内容。如果要在卡片里加图片，就在这行字上面加一行图片代码即可。</p>
                </div>
            </div>

            <div class="event">
                <div class="event-date"></div>
                <div class="event-content">
                    <h3>工作室创作</h3>
                    <p>今天继续《渔港晨光》系列的第5张，重点研究渔网在晨光下的透明感和色彩变化。</p>
                </div>
            </div>

            <div class="event">
                <div class="event-date"></div>
                <div class="event-content">
                    <h3>威海写生</h3>
                    <p>上午去刘公岛附近写生，海风很大，但光线特别漂亮，画了三张小色稿。</p>
                </div>
            </div>

            <div class="event">
                <div class="event-date"></div>
                <div class="event-content">
                    <h3>参加公益活动</h3>
                    <p>下午去当地学校给孩子们做油画分享讲座，反响很好。</p>
                </div>
            </div>

            <div class="event">
                <div class="event-date"></div>
                <div class="event-content">
                    <h3>新作品完成</h3>
                    <p>《渔家系列之十二》正式完成，尺寸 100×120cm。</p>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
