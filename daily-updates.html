<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常动态 2026 - 杜华显</title>
    <style>
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: #f8f8f8;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.7;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 50px;
            color: #222;
            font-size: 32px;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: #222;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 15px;
        }
        .back-btn:hover { background: #444; }

        .timeline {
            position: relative;
            padding-left: 50px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 22px;
            top: 10px;
            bottom: 10px;
            width: 4px;
            background: #e0e0e0;
            border-radius: 2px;
        }
        .event {
            position: relative;
            margin-bottom: 60px;
        }
        .event-date {
            position: absolute;
            left: -55px;
            width: 58px;
            text-align: center;
            background: #222;
            color: white;
            padding: 8px 6px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
        }
        .event-content {
            background: #fff;
            padding: 20px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        .event-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 15px 0;
        }
        .event-content h3 {
            margin: 0 0 12px 0;
            color: #222;
            font-size: 20px;
        }
        .event-content p {
            color: #555;
            margin: 0 0 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <h1>日常动态 Daily Updates 2026</h1>
        
        <div class="timeline">

            <!-- ==================== 示例条目（已准备 35 条）==================== -->

                    <p>今天继续《渔港晨光》系列的第5张，重点研究渔网在晨光下的透明感和色彩变化。</p>
                </div>
            </div>

            <div class="event">
                <div class="event-date">05.24</div>
                <div class="event-content">
                    <h3>威海写生</h3>
                    <img src="https://via.placeholder.com/800x500/ddd/222?text=威海海边" alt="">
                    <p>上午去刘公岛附近写生，海风很大，但光线特别漂亮，画了三张小色稿。</p>
                </div>
            </div>

            <!-- 更多条目模板（你可以一直复制） -->

</body>
</html>
